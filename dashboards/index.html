<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nifty 500 — 200 DMA Breadth</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0b0f0e;
    --surface: #121918;
    --border:  #1e2b28;
    --green:   #00e5a0;
    --red:     #ff4d6d;
    --muted:   #4a6460;
    --text:    #c8d8d5;
    --dim:     #6b8a85;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .title-block h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    color: var(--green);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .title-block p {
    font-size: 0.78rem;
    color: var(--dim);
    margin-top: 4px;
  }

  .range-tabs { display: flex; gap: 4px; }

  .range-tabs button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }

  .range-tabs button.active,
  .range-tabs button:hover {
    background: var(--green);
    color: #000;
    border-color: var(--green);
  }

  .date-picker-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .date-picker-row label {
    font-size: 0.75rem;
    color: var(--dim);
    font-family: 'Space Mono', monospace;
  }

  .date-picker-row input[type="date"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 0.78rem;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
  }

  .date-picker-row input[type="date"]:focus {
    outline: none;
    border-color: var(--green);
  }

  .btn-today {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-today:hover { border-color: var(--green); color: var(--green); }

  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 140px;
    position: relative;
    overflow: hidden;
  }

  .stat::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat.s-green::after { background: var(--green); }
  .stat.s-red::after   { background: var(--red); }
  .stat.s-dim::after   { background: var(--muted); }

  .stat-label {
    font-size: 0.65rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-family: 'Space Mono', monospace;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.35rem;
    font-weight: 700;
    line-height: 1;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.red   { color: var(--red); }
  .stat-value.white { color: var(--text); }

  .stat-sub { font-size: 0.68rem; color: var(--dim); }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chart-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .legend { display: flex; gap: 16px; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: var(--dim);
  }

  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  canvas { width: 100% !important; height: 380px !important; }

  .loading {
    text-align: center;
    padding: 60px;
    color: var(--dim);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
  }

  .error-msg {
    text-align: center;
    padding: 40px;
    color: var(--red);
    font-size: 0.85rem;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="header">
  <div class="title-block">
    <h1>Nifty 500 — Market Breadth</h1>
    <p>% of stocks above / below their 200-day moving average</p>
  </div>
  <div class="range-tabs">
    <button onclick="setRange(30)"   id="r30">1M</button>
    <button onclick="setRange(90)"   id="r90">3M</button>
    <button onclick="setRange(180)"  id="r180" class="active">6M</button>
    <button onclick="setRange(365)"  id="r365">1Y</button>
    <button onclick="setRange(9999)" id="rAll">All</button>
  </div>
</div>

<div class="date-picker-row">
  <label>Stats for:</label>
  <input type="date" id="stats-date" onchange="updateStats()">
  <button class="btn-today" onclick="goToday()">← Latest</button>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="loading">Loading...</div>
</div>

<div class="chart-card">
  <div class="chart-header">
    <span class="chart-title">Above vs Below 200 DMA — % of Nifty 500</span>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#00e5a0"></div>
        Above 200 DMA
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#ff4d6d"></div>
        Below 200 DMA
      </div>
    </div>
  </div>
  <div id="chart-container">
    <div class="loading">Fetching data...</div>
  </div>
</div>

<script>
const API    = "https://trading-intelligence-production.up.railway.app";
let allData  = [];
let chart    = null;
let curRange = 180;

async function loadData() {
  try {
    const res  = await fetch(`${API}/api/dma-breadth?index_name=NIFTY%20500&days=9999`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data || !data.length) { showError("No data in API."); return; }

    allData = data.sort((a,b) => a.date.localeCompare(b.date));

    const latest = allData[allData.length-1].date;
    const picker = document.getElementById("stats-date");
    picker.value = latest;
    picker.max   = latest;
    picker.min   = allData[0].date;

    renderAll(curRange);
  } catch(e) {
    showError(`API error: ${e.message}`);
  }
}

function filterData(days) {
  if (days >= 9999) return allData;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return allData.filter(d => new Date(d.date) >= cutoff);
}

function getRowForDate(dateStr) {
  const sorted = [...allData].sort((a,b) => b.date.localeCompare(a.date));
  for (const row of sorted) {
    if (row.date <= dateStr) return row;
  }
  return allData[allData.length-1];
}

function renderAll(days) {
  const data = filterData(days);
  if (!data.length) return;
  updateStats();
  renderChart(data);
}

function updateStats() {
  const dateStr = document.getElementById("stats-date").value;
  if (!dateStr || !allData.length) return;

  const row      = getRowForDate(dateStr);
  const pct      = parseFloat(row.pct_above);
  const belowPct = (100 - pct).toFixed(1);

  const idx  = allData.findIndex(d => d.date === row.date);
  const prev = idx > 0 ? allData[idx-1] : row;
  const chg  = (pct - parseFloat(prev.pct_above)).toFixed(1);
  const sign = chg >= 0 ? "+" : "";

  const filtered = filterData(curRange);
  const maxPct   = filtered.length ? Math.max(...filtered.map(d => d.pct_above)) : pct;
  const minPct   = filtered.length ? Math.min(...filtered.map(d => d.pct_above)) : pct;
  const avgPct   = filtered.length
    ? (filtered.reduce((s,d) => s + parseFloat(d.pct_above), 0) / filtered.length).toFixed(1)
    : pct;

  document.getElementById("stats-bar").innerHTML = `
    <div class="stat s-green">
      <div class="stat-label">Above 200 DMA</div>
      <div class="stat-value green">${pct}%</div>
      <div class="stat-sub">${row.above_200dma} stocks · ${row.date}</div>
    </div>
    <div class="stat s-red">
      <div class="stat-label">Below 200 DMA</div>
      <div class="stat-value red">${belowPct}%</div>
      <div class="stat-sub">${row.below_200dma} stocks · ${row.date}</div>
    </div>
    <div class="stat ${parseFloat(chg) >= 0 ? 's-green' : 's-red'}">
      <div class="stat-label">Day Change</div>
      <div class="stat-value ${parseFloat(chg) >= 0 ? 'green' : 'red'}">${sign}${chg}%</div>
      <div class="stat-sub">vs ${prev.date}</div>
    </div>
    <div class="stat s-dim">
      <div class="stat-label">Period High</div>
      <div class="stat-value white">${maxPct}%</div>
      <div class="stat-sub">in selected range</div>
    </div>
    <div class="stat s-dim">
      <div class="stat-label">Period Low</div>
      <div class="stat-value white">${minPct}%</div>
      <div class="stat-sub">in selected range</div>
    </div>
    <div class="stat s-dim">
      <div class="stat-label">Period Avg</div>
      <div class="stat-value white">${avgPct}%</div>
      <div class="stat-sub">${filtered.length} trading days</div>
    </div>
  `;
}

function goToday() {
  const latest = allData[allData.length-1]?.date || "";
  document.getElementById("stats-date").value = latest;
  updateStats();
}

function renderChart(data) {
  document.getElementById("chart-container").innerHTML =
    '<canvas id="breadth-chart"></canvas>';

  const ctx    = document.getElementById("breadth-chart").getContext("2d");
  const labels = data.map(d => d.date);
  const above  = data.map(d => parseFloat(d.pct_above));
  const below  = data.map(d => parseFloat((100 - d.pct_above).toFixed(2)));

  if (chart) { chart.destroy(); chart = null; }

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label:            "Above 200 DMA (%)",
          data:             above,
          borderColor:      "#00e5a0",
          backgroundColor:  "rgba(0,229,160,0.06)",
          borderWidth:      2,
          pointRadius:      0,
          pointHoverRadius: 5,
          tension:          0.2,
          fill:             true,
        },
        {
          label:            "Below 200 DMA (%)",
          data:             below,
          borderColor:      "#ff4d6d",
          backgroundColor:  "rgba(255,77,109,0.06)",
          borderWidth:      2,
          pointRadius:      0,
          pointHoverRadius: 5,
          tension:          0.2,
          fill:             true,
        }
      ]
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      interaction:         { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#0e1614",
          borderColor:     "#1e2b28",
          borderWidth:     1,
          titleColor:      "#c8d8d5",
          bodyColor:       "#6b8a85",
          padding:         10,
          titleFont:       { family: "Space Mono", size: 11 },
          bodyFont:        { family: "DM Sans", size: 12 },
          callbacks: {
            title: items => items[0].label,
            label: item  => ` ${item.dataset.label}: ${item.raw}%`
          }
        }
      },
      scales: {
        x: {
          grid: {
            color:     "#1e2b28",
            lineWidth: 1,
            display:   true,
          },
          ticks: {
            color:         "#4a6460",
            maxTicksLimit: 12,
            font:          { family: "Space Mono", size: 10 },
            maxRotation:   0,
          }
        },
        y: {
          min:  0,
          max:  100,
          grid: {
            color:     "#1e2b28",
            lineWidth: 1,
            display:   true,
          },
          ticks: {
            color:    "#4a6460",
            stepSize: 10,
            font:     { family: "Space Mono", size: 10 },
            callback: v => v + "%"
          }
        }
      }
    },
    plugins: [{
      id: "refLine",
      afterDraw(chart) {
        const { ctx, chartArea: { left, right }, scales: { y } } = chart;
        const y50 = y.getPixelForValue(50);
        ctx.save();
        ctx.beginPath();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth   = 1;
        ctx.moveTo(left, y50);
        ctx.lineTo(right, y50);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.25)";
        ctx.font      = "10px Space Mono";
        ctx.fillText("50%", right - 32, y50 - 5);
        ctx.restore();
      }
    }]
  });

  // Sync hover → date picker → stats
  document.getElementById("breadth-chart").addEventListener("mousemove", e => {
    const pts = chart.getElementsAtEventForMode(e, "index", { intersect: false }, true);
    if (pts.length) {
      const d = labels[pts[0].index];
      document.getElementById("stats-date").value = d;
      updateStats();
    }
  });
}

function setRange(days) {
  curRange = days;
  ["30","90","180","365","All"].forEach(r => {
    const b = document.getElementById("r" + r);
    if (b) b.classList.remove("active");
  });
  const idMap = {30:"r30",90:"r90",180:"r180",365:"r365",9999:"rAll"};
  const b = document.getElementById(idMap[days]);
  if (b) b.classList.add("active");
  renderAll(days);
}

function showError(msg) {
  document.getElementById("stats-bar").innerHTML    = `<div class="error-msg">${msg}</div>`;
  document.getElementById("chart-container").innerHTML = `<div class="error-msg">${msg}</div>`;
}

loadData();
</script>
</body>
</html>
